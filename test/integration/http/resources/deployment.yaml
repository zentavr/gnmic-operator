apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-target-inv
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-target-inv
  template:
    metadata:
      labels:
        app: http-target-inv
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        volumeMounts:
        - name: data
          mountPath: /usr/share/nginx/html
      volumes:
      - name: data
        configMap:
          name: http-target-cfg